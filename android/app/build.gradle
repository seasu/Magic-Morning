plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

android {
    namespace "com.magicmorning.magic_morning"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.magicmorning.magic_morning"
        minSdk 26  // Android 8.0+，ML Kit Subject Segmentation 需求
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug // CI 時由 GitHub Actions 替換
            firebaseCrashlytics {
                mappingFileUploadEnabled true
                nativeSymbolUploadEnabled false
            }
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // ML Kit Subject Segmentation
    implementation "com.google.mlkit:subject-segmentation:16.0.0-beta1"

    // Firebase BoM
    implementation platform("com.google.firebase:firebase-bom:33.0.0")
    implementation "com.google.firebase:firebase-crashlytics"
    implementation "com.google.firebase:firebase-analytics"
}
