name: MagicMorning CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ─── 版本號守衛 ────────────────────────────────────────
  version-check:
    name: Version Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pubspec version is bumped
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "Current version: $CURRENT"
          # 與上一個 tag 比較，若版本相同則拒絕
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LAST_TAG" != "none" ]; then
            TAGGED_VER=$(git show "$LAST_TAG":pubspec.yaml | grep '^version:' | awk '{print $2}')
            if [ "$CURRENT" = "$TAGGED_VER" ]; then
              echo "❌ pubspec.yaml version ($CURRENT) 未遞增（上次 tag: $TAGGED_VER）"
              exit 1
            fi
          fi
          echo "✅ Version OK: $CURRENT"

  # ─── Android Build ────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart analyze
        run: dart analyze --fatal-infos

      - name: Flutter test
        run: flutter test

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Build APK (release)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY

      - name: Build AAB (release)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload mapping.txt to Firebase Crashlytics
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-mapping
          path: build/app/outputs/mapping/release/mapping.txt

  # ─── iOS Build ────────────────────────────────────────
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_PLIST: ${{ secrets.GOOGLE_SERVICE_PLIST_IOS }}
        run: echo "$GOOGLE_SERVICE_PLIST" | base64 -d > ios/Runner/GoogleService-Info.plist

      - name: Import Code Signing Certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

      - name: Import Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (release)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build ipa --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload dSYMs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsyms
          path: build/ios/archive/Runner.xcarchive/dSYMs
